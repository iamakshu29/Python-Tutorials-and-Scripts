app:
  name: myapp
  version: 1.2.3
  environment: production
replicaCount: 3
image:
  repository: myapp/image
  tag: 2.3.5
  pullPolicy: IfNotPresent
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi
service:
  type: ClusterIP
  port: 80
ingress:
  enabled: true
  annotations:
    kubernetes.io/ingress.class: nginx
  hosts:
  - host: myapp.example.com
    paths:
    - /
logging:
  level: info
  format: json
features:
  enableFeatureX: true
  enableFeatureY: false
database:
  host: db.example.com
